<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="description" content="We buy houses for cash fast. No repairs, no fees. Get a fair cash offer from Unitly Properties today.">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unitly Properties</title>
  <link rel="icon" href="/logo.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: url('https://images.unsplash.com/photo-1599423300746-b62533397364?auto=format&fit=crop&w=1950&q=80') no-repeat center center fixed;
      background-size: cover;
      color: #1a1a1a;
    }

    header {
      background: #1a593c;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: white;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo img {
      height: 30px;
    }

    .logo span {
      font-size: 16px;
      font-weight: 700;
      color: white;
    }

    .cta-btn {
      background: #4f8cff;
      padding: 12px 22px;
      border-radius: 8px;
      color: white;
      text-decoration: none;
      font-weight: 600;
    }

    .hero {
      height: 75vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 40px;
      color: #fff;
      text-shadow: 0 3px 12px rgba(0,0,0,0.7);
    }

    .hero h2 {
      font-size: 56px;
      max-width: 600px;
    }

    .hero p {
      font-size: 18px;
      max-width: 480px;
      margin-top: 10px;
    }

    .hero button {
      margin-top: 25px;
      background: #4f8cff;
      border: none;
      padding: 14px 26px;
      font-size: 17px;
      color: white;
      border-radius: 10px;
      cursor: pointer;
    }

    section {
      padding: 60px 40px;
      margin: 40px;
      border-radius: 22px;
    }

    .split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
    }

    .feature-box {
      background: rgba(255,255,255,0.9);
      padding: 30px;
      border-radius: 18px;
    }

    .offer-form {
      background: rgba(255,255,255,0.95);
      padding: 40px;
      border-radius: 14px;
      max-width: 500px;
    }

    .offer-form input,
    .offer-form textarea {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border-radius: 8px;
      border: 1px solid #d0d0d0;
      font-size: 16px;
      transition: 0.2s ease;
    }

    /* Validation styles */
    .offer-form input:invalid,
    .offer-form textarea:invalid {
      border: 2px solid #ff4d4d;
    }

    .offer-form input:valid,
    .offer-form textarea:valid {
      border: 2px solid #4CAF50;
    }

    .offer-form button {
      margin-top: 20px;
      width: 100%;
      padding: 14px;
      background: #1a593c;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
    }

    footer {
      padding: 40px;
      background: #0e131f;
      color: white;
      text-align: center;
    }

    #phone-error {
      color: red;
      display: none;
      font-size: 14px;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<header>
  <div class="logo">
    <img src="https://raw.githubusercontent.com/unitlyproperties/website/1335a11f3d6eb2916349ee7fceb9eccac9095c0f/logo.png">
    <span>Unitly Properties</span>
  </div>
  <a class="cta-btn" href="#offer">Get Cash Offer</a>
</header>

<div class="hero">
  <h2>Fast, Fair Cash Offers for Your Home</h2>
  <p>Sell quickly. No repairs. No fees.</p>
  <button onclick="document.getElementById('offer').scrollIntoView()">Request Offer</button>
</div>

<section id="offer">
  <h2>Request Your Free Cash Offer</h2>

  <form action="https://formspree.io/f/xgopavjg" method="POST" class="offer-form" id="offerForm">

    <input type="text" name="name" placeholder="Your Name" required />
    
    <input type="text" name="address" placeholder="Property Address" required />

    <input type="email" name="email" placeholder="Your Email" required />

    <input type="tel" name="phone" id="phone" placeholder="Phone (703-555-1234)" required />
    <small id="phone-error">Please enter a valid phone number</small>

    <textarea name="message" rows="4" placeholder="Tell us about your property" required></textarea>

    <button type="submit">Get My Cash Offer</button>

  </form>
</section>

<footer>
  <p>© 2025 Unitly Properties</p>
</footer>

<script>
const form = document.getElementById("offerForm");
const phone = document.getElementById("phone");
const phoneError = document.getElementById("phone-error");

const phonePattern = /^\\(?\\d{3}\\)?[-.\\s]?\\d{3}[-.\\s]?\\d{4}$/;

phone.addEventListener("input", () => {
  if (!phonePattern.test(phone.value)) {
    phoneError.style.display = "block";
  } else {
    phoneError.style.display = "none";
  }
});

form.addEventListener("submit", function (e) {
  if (!phonePattern.test(phone.value)) {
    e.preventDefault();
    phoneError.style.display = "block";
    phone.focus();
  }
});
</script>

</body>
</html>
